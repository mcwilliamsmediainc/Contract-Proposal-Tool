<style>

  .app-header { background:var(--bg); border-bottom:1px solid var(--border-med); padding:9px 14px; display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap; position:sticky; top:0; z-index:100; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .app-title { font-size:14px; font-weight:600; }
  .app-sub { font-size:11px; color:var(--muted); margin-top:1px; }
  .controls { display:flex; gap:5px; flex-wrap:wrap; align-items:center; }
  input[type=text], select { font-size:12px; height:27px; padding:0 8px; border-radius:7px; border:1px solid var(--border-med); background:var(--bg); color:var(--text); outline:none; font-family:inherit; }
  input[type=text]:focus, select:focus { border-color:var(--focus); box-shadow:0 0 0 2px rgba(55,138,221,.14); }
  #search { width:190px; }
  .btn { font-size:12px; height:27px; padding:0 11px; border-radius:7px; border:1px solid var(--border-med); background:var(--bg); color:var(--text); cursor:pointer; display:inline-flex; align-items:center; gap:4px; font-family:inherit; white-space:nowrap; }
  .btn:hover { background:var(--bg2); }
  .btn-primary { background:#1a1a1a; color:#fff; border-color:#1a1a1a; }
  .btn-primary:hover { background:#333; }
  .stats { font-size:11px; color:var(--muted); white-space:nowrap; }
  .unsaved { width:7px; height:7px; border-radius:50%; background:#e24b4a; display:inline-block; margin-left:5px; opacity:0; transition:opacity .2s; }
  .unsaved.on { opacity:1; }
  .sheet-outer { margin:10px; border:1px solid var(--border-med); border-radius:11px; background:var(--bg); overflow:hidden; }
  .sheet-scroll { overflow-x:auto; max-height:calc(100vh - 80px); overflow-y:auto; }
  table { border-collapse:collapse; white-space:nowrap; min-width:100%; font-size:12px; }
  thead { position:sticky; top:0; z-index:50; }
  thead tr { background:var(--bgh); }
  th { padding:0 7px; height:26px; font-size:10px; font-weight:600; color:var(--muted); text-align:left; border-bottom:1px solid var(--border-med); border-right:1px solid var(--border); cursor:pointer; user-select:none; text-transform:uppercase; letter-spacing:.04em; }
  th:last-child { border-right:none; cursor:default; }
  th:hover:not(:last-child) { color:var(--text); background:#eae9e4; }
  .thi { display:flex; align-items:center; gap:2px; }
  .sa { font-size:9px; opacity:.5; }
  td { height:var(--rh); padding:0; border-bottom:1px solid var(--border); border-right:1px solid var(--border); vertical-align:middle; }
  td:last-child { border-right:none; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:#fafaf8 !important; }
  .ci { width:100%; height:var(--rh); padding:0 7px; border:none; background:transparent; font-size:12px; color:var(--text); font-family:inherit; outline:none; }
  .ci:focus { background:#eef6ff; outline:2px solid var(--focus); outline-offset:-2px; position:relative; z-index:1; }
  .cs { width:100%; height:var(--rh); padding:0 5px; border:none; background:transparent; font-size:12px; color:var(--text); font-family:inherit; outline:none; cursor:pointer; }
  .cs:focus { background:#eef6ff; outline:2px solid var(--focus); outline-offset:-2px; }
  .cbc { display:flex; align-items:center; justify-content:center; height:var(--rh); }
  .cbc input { width:13px; height:13px; cursor:pointer; accent-color:#185FA5; }
  .fc { display:flex; align-items:center; justify-content:center; height:var(--rh); cursor:pointer; font-size:12px; font-weight:700; user-select:none; }
  .fq{color:#ba7517;} .fd{color:#888780;} .fx{color:#e24b4a;}
  .cn{width:36px;min-width:36px;background:var(--bgh);border-right:1px solid var(--border-med)!important;text-align:center;font-size:10px;color:var(--faint);padding:0 3px}
  .cf{width:30px;min-width:30px;text-align:center}
  .cc{min-width:200px;width:200px} .cst{min-width:88px;width:88px} .csv{min-width:64px;width:64px;text-align:center}
  .ctr{min-width:74px;width:74px} .ctp{min-width:130px;width:130px} .cup{min-width:165px;width:165px}
  .cnx{min-width:108px;width:108px} .cot{min-width:230px;width:230px} .cdl{width:28px;min-width:28px;text-align:center}
  .db{border:none;background:none;padding:2px 4px;height:auto;color:var(--faint);cursor:pointer;border-radius:4px;font-size:12px;line-height:1}
  .db:hover{color:#a32d2d;background:#fcebeb}
  .empty{text-align:center;padding:28px;color:var(--muted);font-size:13px}
  #toast{position:fixed;bottom:18px;right:18px;background:#1a1a1a;color:#fff;font-size:12px;padding:7px 14px;border-radius:8px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:9999}
  #toast.show{opacity:1}
</style>
</head>

  try{ const s=localStorage.getItem('mcw_master_v5'); if(s){rows=JSON.parse(s);return;} }catch(e){}
  rows=SEED.map((r,i)=>({
    id:i+1, flag:r[0], client:r[1], strat:r[2],
    website:r[3],hosting:r[4],seo:r[5],adwords:r[6],fbads:r[7],lsa:r[8],
    email:r[9],social:r[10],blog:r[11],mailbox:r[12],photo:r[13],
    tier:r[14]||'', touchpoint:r[15]||'', upsell:r[16]||'', next:r[17]||'', other:r[18]||''
  }));
}

function saveData(){
  try{ localStorage.setItem('mcw_master_v5',JSON.stringify(rows)); }catch(e){ toast('Save failed.'); return; }
  document.getElementById('ud').classList.remove('on');
  toast('Saved \u2713');
}

function markUnsaved(){ document.getElementById('ud').classList.add('on'); }

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const fs=document.getElementById('f-strat').value;
  const ft=document.getElementById('f-tier').value;
  const fv=document.getElementById('f-svc').value;
  let list=rows.filter(r=>{
    if(q&&!r.client.toLowerCase().includes(q)&&!r.strat.toLowerCase().includes(q)&&!(r.other||'').toLowerCase().includes(q)&&!(r.upsell||'').toLowerCase().includes(q)&&!(r.touchpoint||'').toLowerCase().includes(q))return false;
    if(fs&&r.strat!==fs)return false;
    if(ft&&r.tier!==ft)return false;
    if(fv&&!r[fv])return false;
    return true;
  });
  if(sortCol){
    list=[...list].sort((a,b)=>{
      const av=a[sortCol],bv=b[sortCol];
      if(typeof av==='number')return sortDir*(av-bv);
      return sortDir*(av||'').localeCompare(bv||'');
    });
  }
  const total=rows.length;
  document.getElementById('stats').textContent=list.length===total?`${total} clients`:`${list.length} of ${total}`;
  const allCols=['flag','client','strat','tier',...SVCS,'touchpoint','upsell','next','other'];
  allCols.forEach(c=>{ const el=document.getElementById('sa-'+c); if(el)el.textContent=sortCol===c?(sortDir===1?' \u2191':' \u2193'):''; });
  const gi={};rows.forEach((r,i)=>{gi[r.id]=i+1;});
  const tbody=document.getElementById('tbody');
  if(!list.length){ tbody.innerHTML='<tr><td colspan="22" class="empty">No clients match the current filters.</td></tr>'; return; }
  tbody.innerHTML=list.map(r=>{
    const fc_cls={'-':'fd','?':'fq','!':'fx'}[r.flag]||'';
    return`<tr data-id="${r.id}">
      <td class="cn">${gi[r.id]}</td>
      <td class="cf"><div class="fc ${fc_cls}" onclick="cycleFlag(${r.id})" title="Toggle flag">${esc(r.flag)}</div></td>
      <td class="cc"><input class="ci" value="${esc(r.client)}" onchange="setF(${r.id},'client',this.value)" onblur="saveData()"></td>
      <td class="cst"><select class="cs" onchange="setF(${r.id},'strat',this.value);saveData();render()">
        ${STRATS.map(s=>`<option${r.strat===s?' selected':''}>${s}</option>`).join('')}
      </select></td>
      ${SVCS.map(s=>`<td class="csv"><div class="cbc"><input type="checkbox"${r[s]?' checked':''} onchange="setF(${r.id},'${s}',this.checked?1:0);saveData()"></div></td>`).join('')}
      <td class="ctr"><select class="cs" onchange="setF(${r.id},'tier',this.value);saveData();render()">
        <option value=""${!r.tier?' selected':''}>—</option>
        ${['Tier 1','Tier 2','Tier 3'].map(t=>`<option${r.tier===t?' selected':''}>${t}</option>`).join('')}
      </select></td>
      <td class="ctp"><input class="ci" value="${esc(r.touchpoint)}" onchange="setF(${r.id},'touchpoint',this.value)" onblur="saveData()"></td>
      <td class="cup"><input class="ci" value="${esc(r.upsell)}" onchange="setF(${r.id},'upsell',this.value)" onblur="saveData()"></td>
      <td class="cnx"><input class="ci" value="${esc(r.next)}" onchange="setF(${r.id},'next',this.value)" onblur="saveData()"></td>
      <td class="cot"><input class="ci" value="${esc(r.other)}" onchange="setF(${r.id},'other',this.value)" onblur="saveData()"></td>
      <td class="cdl"><button class="db" onclick="delRow(${r.id})" title="Delete">\u2715</button></td>
    </tr>`;
  }).join('');
}

function esc(s){ return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function setF(id,f,v){ const r=rows.find(x=>x.id===id); if(r){r[f]=v;markUnsaved();} }
function cycleFlag(id){ const r=rows.find(x=>x.id===id); if(!r)return; r.flag=FLAG_CYCLE[(FLAG_CYCLE.indexOf(r.flag)+1)%FLAG_CYCLE.length]; markUnsaved();saveData();render(); }
function delRow(id){ const r=rows.find(x=>x.id===id); if(!r||!confirm(`Delete "${r.client}"?`))return; rows=rows.filter(x=>x.id!==id); saveData();render();toast('Deleted.'); }
function addRow(){
  rows.push({id:++nextId,flag:'',client:'New client',strat:'Tiffany',website:0,hosting:0,seo:0,adwords:0,fbads:0,lsa:0,email:0,social:0,blog:0,mailbox:0,photo:0,tier:'',touchpoint:'',upsell:'',next:'',other:''});
  markUnsaved();render();
  setTimeout(()=>{ const rs=document.querySelectorAll('#tbody tr'); const last=rs[rs.length-1]; if(last){const inp=last.querySelector('input.ci'); if(inp){inp.focus();inp.select();}} },40);
}
function sortBy(col){ if(sortCol===col)sortDir*=-1; else{sortCol=col;sortDir=1;} render(); }
function exportCSV(){
  const h=['Flag','Client','Strategist','Website/1x','Hosting','SEO','Google Ads','FB Ads','LSA','Email','Social Media','Blog','Mailbox','Photo/Video','Tier','Scheduled Touchpoint','Potential Upsell','Next Target Touchpoint','Other'];
  const b=rows.map(r=>[r.flag,r.client,r.strat,r.website,r.hosting,r.seo,r.adwords,r.fbads,r.lsa,r.email,r.social,r.blog,r.mailbox,r.photo,r.tier,r.touchpoint,r.upsell,r.next,r.other]);
  const csv=[h,...b].map(row=>row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='master_client_list_2026.csv'; a.click(); toast('Exported.');
}
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2200); }
document.addEventListener('keydown',e=>{ if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveData();} });
initData(); render();
</script>
</body>
</html>
