openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: proposals
    description: Proposal management
  - name: contracts
    description: Contract management
  - name: admin
    description: Admin dashboard analytics
  - name: gemini
    description: Gemini AI chat and image operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /proposals:
    get:
      operationId: listProposals
      tags: [proposals]
      summary: List all proposals
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [draft, sent, accepted, archived]
      responses:
        "200":
          description: List of proposals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Proposal"
    post:
      operationId: createProposal
      tags: [proposals]
      summary: Create a new proposal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProposalBody"
      responses:
        "201":
          description: Created proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"

  /proposals/{id}:
    get:
      operationId: getProposal
      tags: [proposals]
      summary: Get a proposal by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Proposal details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateProposal
      tags: [proposals]
      summary: Update a proposal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProposalBody"
      responses:
        "200":
          description: Updated proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteProposal
      tags: [proposals]
      summary: Delete a proposal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /proposals/{id}/accept:
    post:
      operationId: acceptProposal
      tags: [proposals]
      summary: Accept a proposal with digital signature
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptProposalBody"
      responses:
        "200":
          description: Accepted proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /proposals/{id}/view:
    post:
      operationId: recordProposalView
      tags: [proposals]
      summary: Record a view event for a proposal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: View recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"

  /proposals/generate:
    post:
      operationId: generateProposalContent
      tags: [proposals]
      summary: Generate proposal content using Gemini AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateProposalBody"
      responses:
        "200":
          description: Generated proposal content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedProposalContent"

  /contracts:
    get:
      operationId: listContracts
      tags: [contracts]
      summary: List all contracts
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [draft, sent, signed]
      responses:
        "200":
          description: List of contracts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contract"
    post:
      operationId: createContract
      tags: [contracts]
      summary: Create a new contract
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContractBody"
      responses:
        "201":
          description: Created contract
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"

  /contracts/{id}:
    get:
      operationId: getContract
      tags: [contracts]
      summary: Get a contract by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Contract
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateContract
      tags: [contracts]
      summary: Update a contract
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContractBody"
      responses:
        "200":
          description: Updated contract
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteContract
      tags: [contracts]
      summary: Delete a contract
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /contracts/{id}/send:
    post:
      operationId: sendContract
      tags: [contracts]
      summary: Mark a contract as sent to client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated contract
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /contracts/{id}/sign:
    post:
      operationId: signContract
      tags: [contracts]
      summary: Client signs the contract (public endpoint)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignContractBody"
      responses:
        "200":
          description: Signed contract
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /gemini/conversations:
    get:
      operationId: listGeminiConversations
      tags: [gemini]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeminiConversation"
    post:
      operationId: createGeminiConversation
      tags: [gemini]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGeminiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiConversation"

  /gemini/conversations/{id}:
    get:
      operationId: getGeminiConversation
      tags: [gemini]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiError"
    delete:
      operationId: deleteGeminiConversation
      tags: [gemini]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiError"

  /gemini/conversations/{id}/messages:
    get:
      operationId: listGeminiMessages
      tags: [gemini]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeminiMessage"
    post:
      operationId: sendGeminiMessage
      tags: [gemini]
      summary: Send a message and receive an AI response (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendGeminiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}

  /gemini/generate-image:
    post:
      operationId: generateGeminiImage
      tags: [gemini]
      summary: Generate an image from a text prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateGeminiImageBody"
      responses:
        "200":
          description: Generated image data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateGeminiImageResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Contract:
      type: object
      properties:
        id:
          type: string
        proposalId:
          type: string
          nullable: true
        clientName:
          type: string
        businessName:
          type: string
        clientEmail:
          type: string
        contractType:
          type: string
          enum: [website, marketing, print]
        totalCost:
          type: number
        depositAmount:
          type: number
        remainingBalance:
          type: number
        hostingOption:
          type: string
          enum: [none, basic, platinum]
        status:
          type: string
          enum: [draft, sent, signed]
        signatureData:
          type: string
          nullable: true
        signedAt:
          type: string
          format: date-time
          nullable: true
        referralSource:
          type: string
          nullable: true
        teamMember:
          type: string
          nullable: true
        companyAddress:
          type: string
          nullable: true
        companyAddressLine2:
          type: string
          nullable: true
        companyCity:
          type: string
          nullable: true
        companyState:
          type: string
          nullable: true
        companyZip:
          type: string
          nullable: true
        scheduleA:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - clientName
        - businessName
        - clientEmail
        - contractType
        - totalCost
        - depositAmount
        - remainingBalance
        - hostingOption
        - status
        - createdAt
        - updatedAt

    CreateContractBody:
      type: object
      properties:
        proposalId:
          type: string
          nullable: true
        clientName:
          type: string
        businessName:
          type: string
        clientEmail:
          type: string
        contractType:
          type: string
          enum: [website, marketing, print]
        totalCost:
          type: number
        depositAmount:
          type: number
        remainingBalance:
          type: number
        hostingOption:
          type: string
          enum: [none, basic, platinum]
        scheduleA:
          type: string
          nullable: true
      required:
        - clientName
        - businessName
        - clientEmail
        - contractType

    UpdateContractBody:
      type: object
      properties:
        clientName:
          type: string
        businessName:
          type: string
        clientEmail:
          type: string
        contractType:
          type: string
          enum: [website, marketing, print]
        totalCost:
          type: number
        depositAmount:
          type: number
        remainingBalance:
          type: number
        hostingOption:
          type: string
          enum: [none, basic, platinum]
        status:
          type: string
          enum: [draft, sent, signed]
        scheduleA:
          type: string
          nullable: true

    SignContractBody:
      type: object
      properties:
        signatureData:
          type: string
        referralSource:
          type: string
          nullable: true
        teamMember:
          type: string
          nullable: true
        companyAddress:
          type: string
          nullable: true
        companyAddressLine2:
          type: string
          nullable: true
        companyCity:
          type: string
          nullable: true
        companyState:
          type: string
          nullable: true
        companyZip:
          type: string
          nullable: true
      required:
        - signatureData

    Proposal:
      type: object
      properties:
        id:
          type: string
        clientName:
          type: string
        businessName:
          type: string
        clientEmail:
          type: string
        projectType:
          type: string
          enum: [web, marketing, print]
        status:
          type: string
          enum: [draft, sent, accepted, archived]
        totalAmount:
          type: number
        content:
          type: string
          nullable: true
        specialContext:
          type: string
          nullable: true
        loomVideoUrl:
          type: string
          nullable: true
        calendlyUrl:
          type: string
          nullable: true
        signatureData:
          type: string
          nullable: true
        signedAt:
          type: string
          format: date-time
          nullable: true
        numberOfPages:
          type: integer
          nullable: true
        pageNames:
          type: string
          nullable: true
        clientStrategist:
          type: string
          nullable: true
        viewCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - clientName
        - businessName
        - clientEmail
        - projectType
        - status
        - totalAmount
        - viewCount
        - createdAt
        - updatedAt

    CreateProposalBody:
      type: object
      properties:
        clientName:
          type: string
        businessName:
          type: string
        clientEmail:
          type: string
        projectType:
          type: string
          enum: [web, marketing, print]
        totalAmount:
          type: number
        specialContext:
          type: string
          nullable: true
        content:
          type: string
          nullable: true
        loomVideoUrl:
          type: string
          nullable: true
        calendlyUrl:
          type: string
          nullable: true
        numberOfPages:
          type: integer
          nullable: true
        pageNames:
          type: string
          nullable: true
        clientStrategist:
          type: string
          nullable: true
      required:
        - clientName
        - businessName
        - clientEmail
        - projectType

    UpdateProposalBody:
      type: object
      properties:
        clientName:
          type: string
        businessName:
          type: string
        clientEmail:
          type: string
        projectType:
          type: string
          enum: [web, marketing, print]
        totalAmount:
          type: number
        status:
          type: string
          enum: [draft, sent, accepted, archived]
        content:
          type: string
          nullable: true
        specialContext:
          type: string
          nullable: true
        loomVideoUrl:
          type: string
          nullable: true
        calendlyUrl:
          type: string
          nullable: true
        numberOfPages:
          type: integer
          nullable: true
        pageNames:
          type: string
          nullable: true
        clientStrategist:
          type: string
          nullable: true

    AcceptProposalBody:
      type: object
      properties:
        signatureData:
          type: string
      required:
        - signatureData

    GenerateProposalBody:
      type: object
      properties:
        clientName:
          type: string
        businessName:
          type: string
        projectType:
          type: string
          enum: [web, marketing, print]
        totalAmount:
          type: number
        specialContext:
          type: string
          nullable: true
      required:
        - clientName
        - businessName
        - projectType

    GeneratedProposalContent:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    AdminStats:
      type: object
      properties:
        totalEngagement:
          type: integer
        activePipeline:
          type: integer
        conversionRate:
          type: number
        totalProposals:
          type: integer
        draftCount:
          type: integer
        sentCount:
          type: integer
        acceptedCount:
          type: integer
      required:
        - totalEngagement
        - activePipeline
        - conversionRate
        - totalProposals
        - draftCount
        - sentCount
        - acceptedCount

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    GeminiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    GeminiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    CreateGeminiConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    SendGeminiMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content
    GeminiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/GeminiMessage"
      required:
        - id
        - title
        - createdAt
        - messages
    GenerateGeminiImageBody:
      type: object
      properties:
        prompt:
          type: string
      required:
        - prompt
    GenerateGeminiImageResponse:
      type: object
      properties:
        b64_json:
          type: string
        mimeType:
          type: string
      required:
        - b64_json
        - mimeType
    GeminiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
